; SAFE_MODE hardware test bench for the Suicide Marauder boot gate (docs/HARDWARE-TEST.md).
;
; The bootgate sources are NOT checked in here — scripts/build_test_harness.(ps1|sh) copies them
; from ../bootgate into src/ before building (kept .gitignored so there is one canonical copy).
; Default env targets a classic ESP32 (4 MB), GATE_INPUT_SERIAL, SUICIDE_SAFE_MODE (zero erases).
;
; Build:   pio run            (after running the build script to stage sources)
; Upload:  pio run -t upload --upload-port <PORT>
; Monitor: pio device monitor -b 115200 -p <PORT>

[platformio]
default_envs = gold

[env:gold]                       ; classic ESP32 (e.g. Lonely Binary Gold), 4 MB
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = ../partitions/suicide_4MB.csv
build_flags =
    -DSUICIDE_SAFE_MODE
    -DGATE_INPUT_SERIAL
    -DARMING_PIN=27
    -DARMING_ACTIVE_LEVEL=1
    -DARMING_PULL=2

[env:s3]                         ; ESP32-S3 example (8/16 MB); adjust partitions/pin for your board
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = ../partitions/suicide_16MB.csv
build_flags =
    -DSUICIDE_SAFE_MODE
    -DGATE_INPUT_SERIAL
    -DARMING_PIN=2
    -DARMING_ACTIVE_LEVEL=1
    -DARMING_PULL=2
