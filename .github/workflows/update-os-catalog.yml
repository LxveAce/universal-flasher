name: Update OS catalog

# Keep the bundled Software-OS catalog (Kali / Tails / Arch versions + checksums) current
# automatically: weekly (and on demand), resolve the latest upstream versions and open a PR
# with the refreshed uf_core/os_catalog.json. The app still works offline from whatever is
# bundled; this just keeps the pinned fallback fresh.

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Refresh pinned OS versions
        run: python scripts/update_os_catalog.py
      - name: Open a PR if the catalog changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(os-catalog): refresh pinned OS versions"
          title: "chore(os-catalog): refresh pinned OS versions"
          body: |
            Automated refresh of the bundled Software-OS catalog (latest Kali / Tails / Arch
            versions + checksums). Generated by `.github/workflows/update-os-catalog.yml`.
          branch: auto/os-catalog-refresh
          delete-branch: true
          add-paths: |
            uf_core/os_catalog.json
