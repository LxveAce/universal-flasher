name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyQt5 pyinstaller

      - name: Build exe
        run: python build.py --onefile

      - name: Rename artifact
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if (-not $tag) { $tag = "dev" }
          Move-Item dist/universal-flasher.exe "dist/universal-flasher-${tag}-windows-x64.exe"

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          gh release upload $tag "dist/universal-flasher-${tag}-windows-x64.exe" --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/universal-flasher-*-windows-x64.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyQt5 pyinstaller

      - name: Build binary
        run: python build.py --onefile

      - name: Rename artifact
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -z "$TAG" ] && TAG="dev"
          mv dist/universal-flasher "dist/universal-flasher-${TAG}-macos-arm64"
          chmod +x "dist/universal-flasher-${TAG}-macos-arm64"

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" "dist/universal-flasher-${TAG}-macos-arm64" --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/universal-flasher-*-macos-arm64

  build-linux-x64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyQt5 pyinstaller

      - name: Build binary
        run: python build.py --onefile

      - name: Rename artifact
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -z "$TAG" ] && TAG="dev"
          mv dist/universal-flasher "dist/universal-flasher-${TAG}-linux-x64"
          chmod +x "dist/universal-flasher-${TAG}-linux-x64"

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" "dist/universal-flasher-${TAG}-linux-x64" --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: dist/universal-flasher-*-linux-x64

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv python3-tk python3-pyqt5 \
            libxcb-xinerama0 libxcb-cursor0 libgl1

      - name: Create venv with system packages
        run: |
          python3 -m venv --system-site-packages .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pyinstaller

      - name: Build binary
        run: .venv/bin/python build.py --onefile

      - name: Rename artifact
        run: |
          TAG="${{ github.event.release.tag_name }}"
          [ -z "$TAG" ] && TAG="dev"
          mv dist/universal-flasher "dist/universal-flasher-${TAG}-linux-arm64"
          chmod +x "dist/universal-flasher-${TAG}-linux-arm64"

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" "dist/universal-flasher-${TAG}-linux-arm64" --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: dist/universal-flasher-*-linux-arm64

  # After every platform build, aggregate ONE SHA256SUMS.txt over the attached binaries and add it to
  # the release, so a download can be integrity-checked (`sha256sum -c SHA256SUMS.txt`). Runs only on a
  # real release (nothing to sum on a dispatch build); `if: always()` so a best-effort platform build
  # that failed doesn't skip the sums for the ones that succeeded.
  checksums:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux-x64, build-linux-arm64]
    if: always() && github.event_name == 'release'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Aggregate + upload SHA256SUMS.txt
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mkdir dl && cd dl
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern 'universal-flasher-*' --clobber
          sha256sum universal-flasher-* | sed 's/ \*/  /' > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt
          cd ..
          gh release upload "$TAG" SHA256SUMS.txt --clobber
